<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Shield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 400px;
      background: #0f0f14;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .logo { font-size: 24px; }
    .content { padding: 16px; }

    .status-card {
      background: #16161e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-card h3 { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
    }
    .status-dot.warn { background: #eab308; }
    .status-dot.error { background: #ef4444; }

    .quick-actions { display: flex; flex-direction: column; gap: 6px; }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #16161e;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .action-btn:hover { background: #22223a; }
    .action-icon { font-size: 16px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      background: #16161e;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; display: block; }
    .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #2a2a3a;
      text-align: center;
      color: #555;
      font-size: 11px;
    }

    #api-url-input {
      width: 100%;
      padding: 6px 8px;
      background: #0f0f14;
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🛡️</span>
    <h1>QA Shield</h1>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="scans-count">0</span>
        <span class="stat-label">Scans</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="enriched-count">0</span>
        <span class="stat-label">Enriched</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="issues-count">0</span>
        <span class="stat-label">Issues</span>
      </div>
    </div>

    <div class="status-card">
      <h3>System Health</h3>
      <div class="status-indicator" id="health-status">
        <div class="status-dot" id="health-dot"></div>
        <span id="health-text">Checking...</span>
      </div>
    </div>

    <div class="status-card">
      <h3>Backend API</h3>
      <input type="text" id="api-url-input" value="http://localhost:3000" placeholder="Backend URL">
    </div>

    <div class="quick-actions">
      <button class="action-btn" id="scan-all-btn">
        <span class="action-icon">🔒</span>
        <span>Run Full Security Scan</span>
      </button>
      <button class="action-btn" id="benchmark-btn">
        <span class="action-icon">⚡</span>
        <span>Performance Benchmark</span>
      </button>
      <button class="action-btn" id="health-btn">
        <span class="action-icon">💓</span>
        <span>Health Check</span>
      </button>
    </div>
  </div>

  <div class="footer">
    QA Shield v0.1.0 — Creator.fun QA Automation
  </div>

  <script src="popup.js"></script>
</body>
</html>
